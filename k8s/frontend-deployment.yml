kind: Deployment
apiVersion: apps/v1
metadata:
  name: frontend-deployment
  namespace: chat-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      name: frontend-pod
      namespace: chat-app
      labels:
         app: frontend

    spec:
      containers:
        - name: chatapp-frontend
          image: omkar1191/chat-frontend:v1.0
          ports:
            - containerPort: 80
          env:
           - name: NODE_ENV
             value: production

