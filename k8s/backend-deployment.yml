kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend-deployment
  namespace: chat-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      namespace: chat-app
      labels:
         app: backend
    
    spec:
      containers:
        - name: chatapp-backend
          image: omkar1191/chat-backend:v1.0
          ports:
            - containerPort: 5001
          env:
           - name: NODE_ENV
             value: production
           - name: MONGODB_URI
             value: "mongodb://root:root@mongodb-service:27017/chatdb?authSource=admin"
           - name: JWT_SECRET
             valueFrom: 
                secretKeyRef:
                  name: chatapp-secrets
                  key: jwt
           - name: PORT
             value: "5001"       

